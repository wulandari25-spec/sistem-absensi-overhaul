[variables]
NIXPACKS_PHP_VERSION = "8.4"

[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "nodejs-20_x"]

[phases.build]
cmds = [
    "composer install --ignore-platform-reqs --no-interaction --prefer-dist --optimize-autoloader",
    "npm install",
    "npm run build"
]

[start]
cmd = "php artisan storage:link && php artisan migrate --force && php artisan db:seed --force && php artisan serve --host=0.0.0.0 --port=$PORT"
